# slide2vec feature extraction config
# Full documentation: https://github.com/clemsgrs/slide2vec
#
# Run:
#   python -m slide2vec --config configs/slide2vec.yaml

data:
  csv_path: /data/slide2vec_input.csv       # generated by pipeline/02_feature_extraction/prepare_csv.py
  output_dir: /data/features/               # tile embeddings + coordinates written here

model:
  name: virchow2                            # foundation model: virchow2, conch, uni, ...
  # Additional model-specific settings (e.g. HF token) go here

tiling:
  spacing: 0.5                              # target spacing in μm/px
  size: 224                                 # tile size in pixels
  tissue_threshold: 0.1                     # min fraction of tissue per tile

preprocessing:
  batch_size: 128
  num_workers: 8                            # set to SLURM_CPUS_PER_TASK

output:
  format: pt                                # pt or npy
  save_tile_features: true                  # tile-level embeddings for AMIL
  save_slide_features: false                # slide-level aggregation not needed for AMIL
